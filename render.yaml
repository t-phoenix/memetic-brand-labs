# Render Blueprint — Narrative Engine API + background worker
# Apply: https://dashboard.render.com/blueprint/new?repo=<YOUR_GITHUB_REPO_URL>
#
# Redis: use Upstash free tier (cheapest) — paste REDIS_URL into both services.
# Docs: docs/narrative-engine/deployment.md

services:
  - type: web
    name: narrative-engine-api
    runtime: node
    plan: starter
    region: oregon
    healthCheckPath: /health
    buildCommand: cd narrative-engine-api && npm ci && npm run build
    startCommand: cd narrative-engine-api && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: STORAGE_BUCKET
        value: share-graphics
      - key: X402_PAY_TO
        sync: false
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: RERUN_PRICE_USDC
        value: "10"

  - type: worker
    name: narrative-engine-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: cd narrative-engine-api && npm ci && npm run build
    startCommand: cd narrative-engine-api && node dist/jobs/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: STORAGE_BUCKET
        value: share-graphics
