# Render Blueprint — Narrative Engine API + background worker
# Apply: https://dashboard.render.com/blueprint/new?repo=<YOUR_GITHUB_REPO_URL>
#
# If configuring manually in Dashboard (not Blueprint):
#   Root Directory: narrative-engine-api
#   Build Command:  npm ci && npm run build
#   Start Command:  npm start
#   Do NOT use yarn — this package uses package-lock.json (npm).
#
# Redis: Upstash free tier — same REDIS_URL on web + worker.
# Docs: docs/narrative-engine/deployment.md

services:
  - type: web
    name: narrative-engine-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: narrative-engine-api
    healthCheckPath: /health
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: STORAGE_BUCKET
        value: share-graphics
      - key: X402_PAY_TO
        sync: false
      - key: X402_FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: RERUN_PRICE_USDC
        value: "10"

  - type: worker
    name: narrative-engine-worker
    runtime: node
    plan: starter
    region: oregon
    rootDir: narrative-engine-api
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: STORAGE_BUCKET
        value: share-graphics
